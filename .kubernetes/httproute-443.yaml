apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: %SERVICE_NAME%-route
  namespace: %KUBERNETES_NAMESPACE%
spec:
  parentRefs:
    - name: %SERVICE_NAME%-gateway
  hostnames:
    - %DOMAIN_NAME%
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: %SERVICE_NAME%
          port: 8080